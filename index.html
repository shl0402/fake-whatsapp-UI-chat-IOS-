<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local WhatsApp Mockup Editor V20</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Force Apple System Font */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wa-bg {
      background-color: #E5DDD5;
      /* Authentic WhatsApp Doodle Pattern */
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: cover;
      background-blend-mode: multiply;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Authentic WhatsApp Group Colors ---
    const WA_COLORS = [
      '#EA0070', '#35CD96', '#539BF1', '#FF8A00', 
      '#CB87D6', '#91AB01', '#007AFF', '#DF7A9E', 
      '#E542A3', '#6BCBE6', '#F2A900', '#00A36C'
    ];

    const Icons = {
      ChevronLeft: () => (
        <svg viewBox="0 0 14 24" fill="none" stroke="#007AFF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-[14px] h-[22px] mr-1">
          <path d="M11 4L2.5 12L11 20" />
        </svg>
      ),
      VideoWithArrow: () => (
        <svg viewBox="0 0 34 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[36px] h-[24px]">
          <path d="M3 8.5C3 7.11929 4.11929 6 5.5 6H15.5C16.8807 6 18 7.11929 18 8.5V15.5C18 16.8807 16.8807 18 15.5 18H5.5C4.11929 18 3 16.8807 3 15.5V8.5Z" />
          <polygon points="18 10.5 24 7.5 24 16.5 18 13.5" strokeLinejoin="round" />
          <path d="M28 11L30.5 13.5L33 11" strokeWidth="1.5" />
        </svg>
      ),
      Plus: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[26px] h-[26px]">
          <line x1="12" y1="4" x2="12" y2="20" />
          <line x1="4" y1="12" x2="20" y2="12" />
        </svg>
      ),
      Camera: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[24px] h-[24px]">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.5l1.5-2.5h6l1.5 2.5H20a2 2 0 0 1 2 2z" />
          <circle cx="12" cy="13" r="3.5" />
        </svg>
      ),
      Mic: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[22px] h-[22px]">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        </svg>
      ),
      Sticker: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#8E8E93" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[20px] h-[20px]">
          <path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z" />
          <path d="M15 3v6h6" />
        </svg>
      ),
      Cellular: () => (
        <svg viewBox="0 0 18 12" fill="currentColor" className="w-[16px] h-[11px]">
          <rect x="0" y="9" width="3" height="3" rx="1" />
          <rect x="5" y="6" width="3" height="6" rx="1" />
          <rect x="10" y="3" width="3" height="9" rx="1" />
          <rect x="15" y="0" width="3" height="12" rx="1" />
        </svg>
      ),
      Battery: () => (
        <svg viewBox="0 0 25 12" fill="none" className="w-[24px] h-[12px] relative top-[-0.5px]">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" strokeWidth="1"/>
          <rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/>
          <path d="M23 4.5C23.5523 4.5 24 4.94772 24 5.5V6.5C24 7.05228 23.5523 7.5 23 7.5" fill="currentColor"/>
        </svg>
      ),
      DragHandle: () => (
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <circle cx="4" cy="6" r="1"></circle>
          <circle cx="4" cy="12" r="1"></circle>
          <circle cx="4" cy="18" r="1"></circle>
        </svg>
      )
    };

    function WhatsAppGenerator() {
      const [config, setConfig] = useState({
        osTime: '8:18',
        unreadCount: '70',
        networkType: 'LTE',
        chatName: 'Group Name',
        chatType: 'group',
        members: 'Timothy, Samuel, ...',
        groupIcon: '',
        chatScale: 1.0, 
      });

      const [messages, setMessages] = useState([
        {
          id: 1,
          sender: 'other',
          senderName: 'Username',
          text: 'Text message',
          time: '6:19 AM', 
          hasImage: false,
          isSticker: false,
          imageUrl: '',
          avatarUrl: '',
          reaction: '',
          status: 'read'
        }
      ]);

      // --- UI States ---
      const [isCollapsed, setIsCollapsed] = useState(false);

      // --- Drag & Drop States ---
      const [draggableId, setDraggableId] = useState(null);
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);

      // --- Modal / Preflight State ---
      const [showExportModal, setShowExportModal] = useState(false);
      const [showStoryboardPreflight, setShowStoryboardPreflight] = useState(false);
      const [storyboardPages, setStoryboardPages] = useState([]);
      const previewContainerRef = useRef(null);

      const handleDragStart = (e, index) => {
        setDraggedIdx(index);
        e.dataTransfer.effectAllowed = 'move';
        // Need to set data to allow dragging in some browsers
        e.dataTransfer.setData('text/plain', index);
      };

      const handleDragOver = (e, index) => {
        e.preventDefault();
        setDragOverIdx(index);
      };

      const handleDrop = (e, dropIndex) => {
        e.preventDefault();
        if (draggedIdx === null || draggedIdx === dropIndex) {
          setDragOverIdx(null);
          return;
        }
        const newMessages = [...messages];
        const draggedMsg = newMessages[draggedIdx];
        newMessages.splice(draggedIdx, 1);
        newMessages.splice(dropIndex, 0, draggedMsg);
        setMessages(newMessages);
        setDraggedIdx(null);
        setDragOverIdx(null);
        setDraggableId(null);
      };

      const handleDragEnd = () => {
        setDraggedIdx(null);
        setDragOverIdx(null);
        setDraggableId(null);
      };

      const handleImageUpload = (e, callback) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            callback(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const exportDataJSON = () => {
        const data = { config, messages };
        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-mockup-export.json';
        a.click();
      };

      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.config) setConfig({...config, ...data.config}); 
            if (data.messages) setMessages(data.messages);
          } catch (err) {
            alert('Invalid JSON file format.');
          }
        };
        reader.readAsText(file);
      };

      // --- EXPORT GENERATORS ---
      
      const generateInteractiveHTML = () => {
        const mockupNode = document.getElementById('mockup-container');
        if (!mockupNode) return;
        const clone = mockupNode.cloneNode(true);
        const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>${config.chatName} - Interactive</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6; 
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .wa-bg {
      background-color: #E5DDD5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: cover;
      background-blend-mode: multiply;
    }
    @media (max-width: 450px) {
      #mockup-container { transform: scale(0.85); transform-origin: top center; }
    }
  </style>
</head>
<body>${clone.outerHTML}</body>
</html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-interactive.html';
        a.click();
        setShowExportModal(false);
      };

      const generateLongCaptureHTML = () => {
        const mockupNode = document.getElementById('mockup-container');
        if (!mockupNode) return;
        const clone = mockupNode.cloneNode(true);
        clone.className = clone.className.replace('h-[852px]', 'h-auto min-h-[852px]');
        const chatBody = clone.querySelector('.overflow-y-auto');
        if (chatBody) chatBody.className = chatBody.className.replace('overflow-y-auto', 'overflow-visible');

        const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>${config.chatName} - Full Capture</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6; 
      margin: 0;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
      min-height: 100vh;
    }
    .wa-bg {
      background-color: #E5DDD5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: 400px auto;
      background-repeat: repeat;
      background-blend-mode: multiply;
    }
  </style>
</head>
<body>${clone.outerHTML}</body>
</html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-full-capture.html';
        a.click();
        setShowExportModal(false);
      };

      // --- STORYBOARD PREFLIGHT LOGIC ---
      const calculateStoryboardPages = () => {
        const sourceContainer = document.getElementById('scale-wrapper');
        if (!sourceContainer) return;
        
        // Convert React nodes to raw HTML strings for the preview
        const rawMessageHTMLs = Array.from(sourceContainer.children).map(node => ({
            html: node.outerHTML,
            height: node.offsetHeight + parseInt(window.getComputedStyle(node).marginTop || 0)
        }));

        const pages = [];
        let currentPage = [];
        let currentHeight = 0;
        const MAX_HEIGHT = 640 / config.chatScale; 

        rawMessageHTMLs.forEach(msg => {
            if (currentHeight + msg.height > MAX_HEIGHT && currentPage.length > 0) {
                pages.push([...currentPage]);
                currentPage = [msg.html];
                currentHeight = msg.height;
            } else {
                currentPage.push(msg.html);
                currentHeight += msg.height;
            }
        });
        if (currentPage.length > 0) pages.push(currentPage);
        
        setStoryboardPages(pages);
        setShowExportModal(false);
        setShowStoryboardPreflight(true);
      };

      const downloadStoryboardHTML = () => {
        const mockupNode = document.getElementById('mockup-container');
        if (!mockupNode) return;
        const cloneStory = mockupNode.cloneNode(true);
        const statusBarHTML = cloneStory.children[0].outerHTML.replace('id="notch-placeholder"', 'style="display:none;"');
        const headerHTML = cloneStory.children[1].outerHTML;
        const footerHTML = cloneStory.children[3].outerHTML;

        // Build the HTML template
        const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>${config.chatName} - Storyboard</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6; 
      margin: 0;
      display: flex;
      padding: 40px;
      gap: 32px;
      overflow-x: auto;
      min-height: 100vh;
      align-items: center;
    }
    .wa-bg {
      background-color: #E5DDD5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: 400px auto;
      background-repeat: repeat;
      background-blend-mode: multiply;
    }
  </style>
</head>
<body>
    ${storyboardPages.map(pageMsgs => `
      <div class="w-[393px] h-[852px] bg-white rounded-[24px] border-4 border-gray-300 flex flex-col relative overflow-hidden shadow-md shrink-0">
        ${statusBarHTML}
        ${headerHTML}
        <div class="flex-1 pl-1 pr-3 pt-3 pb-20 relative wa-bg overflow-hidden">
            <div style="transform: scale(${config.chatScale}); transform-origin: top left; width: ${100/config.chatScale}%;">
                ${pageMsgs.join('')}
            </div>
        </div>
        ${footerHTML}
      </div>
    `).join('')}
</body>
</html>`;

        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-storyboard.html';
        a.click();
        setShowStoryboardPreflight(false);
      };

      const addMessage = (type) => {
        setMessages([...messages, {
          id: Date.now(),
          sender: type,
          senderName: type === 'other' ? 'New User' : 'You',
          text: '',
          time: config.osTime + ' AM', 
          hasImage: false,
          isSticker: false,
          imageUrl: '',
          avatarUrl: '',
          reaction: '',
          status: 'read'
        }]);
      };

      const deleteMessage = (id) => {
        setMessages(messages.filter(msg => msg.id !== id));
      };

      const getAvatarForSender = (senderName) => {
        const msgWithAvatar = messages.find(m => m.sender === 'other' && m.senderName === senderName && m.avatarUrl);
        return msgWithAvatar ? msgWithAvatar.avatarUrl : null;
      };

      const getColorForUser = (username) => {
        if (!username) return WA_COLORS[0];
        let hash = 0;
        for (let i = 0; i < username.length; i++) {
          hash = username.charCodeAt(i) + ((hash << 5) - hash);
        }
        const index = Math.abs(hash) % WA_COLORS.length;
        return WA_COLORS[index];
      };

      const renderTextWithMentions = (text) => {
        if (!text) return null;
        const parts = text.split(/(@[^\s,?!]+)/g);
        return parts.map((part, i) => {
          if (part.startsWith('@')) {
            return <span key={i} className="text-[#007AFF]">{part}</span>;
          }
          return part;
        });
      };

      const Tick = ({ status, isOverlay }) => {
        const color = status === 'read' ? '#34B7F1' : (isOverlay ? '#FFFFFF' : '#8696A0');
        const opacity = isOverlay && status !== 'read' ? 'opacity-100' : 'opacity-80';
        
        if (status === 'sent') {
          return (
            <svg viewBox="0 0 16 15" width="16" height="14" className={`ml-[1px] ${opacity}`}>
              <path d="M10.9 4.3L6.5 10.1L4 7.2" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          );
        }
        return (
          <svg viewBox="0 0 16 15" width="18" height="14" className={`ml-[1px] ${opacity}`}>
            <path d="M10.9 4.3L6.5 10.1L4 7.2" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M15 4.3L10.6 10.1L9 8" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        );
      };

      // Grouping Logic for Sticker Pairs
      const groupedMessages = [];
      for (let i = 0; i < messages.length; i++) {
        if (
          messages[i].isSticker && 
          i + 1 < messages.length && 
          messages[i+1].isSticker && 
          messages[i].sender === messages[i+1].sender && 
          messages[i].senderName === messages[i+1].senderName
        ) {
          groupedMessages.push({ isPair: true, msg1: messages[i], msg2: messages[i+1], index1: i, index2: i + 1 });
          i++; 
        } else {
          groupedMessages.push({ isPair: false, msg: messages[i], index: i });
        }
      }

      return (
        <div className="flex h-screen bg-gray-100">
          
          {/* --- EXPORT MODAL --- */}
          {showExportModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
                    <h3 className="text-xl font-bold mb-4 text-gray-800">Export HTML Format</h3>
                    <p className="text-gray-600 mb-6 text-sm">Choose how you want your mockup to be displayed in the exported file.</p>
                    
                    <div className="space-y-3">
                        <button onClick={generateInteractiveHTML} className="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition-all flex flex-col group">
                            <span className="font-bold text-gray-800 group-hover:text-blue-700">📱 Interactive Scroll</span>
                            <span className="text-xs text-gray-500 mt-1">Standard iPhone frame. Scroll inside to read.</span>
                        </button>
                        <button onClick={generateLongCaptureHTML} className="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition-all flex flex-col group">
                            <span className="font-bold text-gray-800 group-hover:text-blue-700">📏 Full Length Capture</span>
                            <span className="text-xs text-gray-500 mt-1">One very long screen. Best for screenshot extensions.</span>
                        </button>
                        <button onClick={calculateStoryboardPages} className="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-purple-500 hover:bg-purple-50 transition-all flex flex-col group">
                            <span className="font-bold text-gray-800 group-hover:text-purple-700">📖 Paginated Storyboard</span>
                            <span className="text-xs text-gray-500 mt-1">Side-by-side screens. Best for presentations.</span>
                        </button>
                    </div>

                    <button onClick={() => setShowExportModal(false)} className="mt-6 w-full py-2 text-gray-500 hover:bg-gray-100 rounded-lg font-medium transition-colors">
                        Cancel
                    </button>
                </div>
            </div>
          )}

          {/* --- STORYBOARD PREFLIGHT OVERLAY --- */}
          {showStoryboardPreflight && (
            <div className="fixed inset-0 z-50 flex flex-col bg-gray-900">
                <div className="bg-white p-4 flex justify-between items-center shadow-md z-10 shrink-0">
                    <div>
                        <h3 className="text-lg font-bold text-gray-800">Storyboard Preview</h3>
                        <p className="text-sm text-gray-500">Global Scale: {config.chatScale}x. Check page breaks below.</p>
                    </div>
                    <div className="space-x-3">
                        <button onClick={() => setShowStoryboardPreflight(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">
                            Back to Editor
                        </button>
                        <button onClick={downloadStoryboardHTML} className="bg-purple-600 text-white px-4 py-2 rounded-lg shadow-sm font-semibold hover:bg-purple-700 transition-colors">
                            Download HTML
                        </button>
                    </div>
                </div>
                
                {/* Horizontal Scrolling Preview Area */}
                <div className="flex-1 overflow-auto bg-gray-900 flex items-start gap-8 p-8" ref={previewContainerRef}>
                    {storyboardPages.map((pageMsgs, idx) => (
                        <div key={idx} className="relative shrink-0" style={{ width: '294.75px', height: '639px' }}>
                            <div className="absolute top-0 left-0 w-[393px] h-[852px] bg-white rounded-[24px] border-4 border-gray-300 flex flex-col overflow-hidden shadow-2xl" style={{ transform: 'scale(0.75)', transformOrigin: 'top left' }}>
                                {/* Dummy Status Bar & Header for preview visual */}
                                <div className="h-12 bg-[#F6F6F6] text-black pl-8 pr-[22px] flex justify-between items-center text-[15px] font-semibold z-10 pt-2 shrink-0">
                                    <span>{config.osTime}</span><div className="flex space-x-[4px]"><Icons.Cellular/><Icons.Battery/></div>
                                </div>
                                <div className="bg-[#F6F6F6] border-b border-gray-300 px-1 py-2 flex items-center justify-between z-10 shadow-sm shrink-0">
                                    <div className="flex items-center"><div className="flex px-1 text-[#007AFF]"><Icons.ChevronLeft/></div><div className="w-10 h-10 bg-gray-300 rounded-full mr-3 overflow-hidden">{config.groupIcon && <img src={config.groupIcon} className="w-full h-full object-cover" />}</div><div className="flex flex-col"><span className="font-semibold text-[16px] text-black">{config.chatName}</span></div></div>
                                </div>
                                {/* The scaled page content */}
                                <div className="flex-1 pl-1 pr-3 pt-3 pb-20 relative wa-bg overflow-hidden pointer-events-none">
                                    <div style={{ transform: `scale(${config.chatScale})`, transformOrigin: 'top left', width: `${100/config.chatScale}%` }}
                                         dangerouslySetInnerHTML={{ __html: pageMsgs.join('') }} />
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
          )}

          {/* LEFT PANE: Editor */}
          <div className="w-1/2 p-6 bg-white overflow-y-auto border-r border-gray-300 shadow-lg z-20">
            
            {/* Header with Import/Export Buttons */}
            <div className="flex justify-between items-center mb-6">
              <h1 className="text-2xl font-bold text-gray-800">WhatsApp Mockup V20</h1>
              <div className="flex space-x-2">
                <label className="bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg shadow-sm text-sm font-semibold cursor-pointer hover:bg-gray-200 transition-colors">
                  Import JSON
                  <input type="file" accept=".json" onChange={importData} className="hidden" />
                </label>
                <button onClick={exportDataJSON} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg shadow-sm text-sm font-semibold hover:bg-blue-200 transition-colors">
                  Export JSON
                </button>
                <button onClick={() => setShowExportModal(true)} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg shadow-sm text-sm font-semibold hover:bg-blue-700 transition-colors">
                  Export HTML
                </button>
              </div>
            </div>
            
            <div className="space-y-4 mb-8 p-5 bg-gray-50 rounded-xl border border-gray-200">
              <h2 className="font-bold text-lg border-b pb-2 text-gray-700">Header Settings</h2>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">OS Time</label>
                  <input type="text" value={config.osTime} onChange={e => setConfig({...config, osTime: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Network (LTE/Wi-Fi)</label>
                  <input type="text" value={config.networkType} onChange={e => setConfig({...config, networkType: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Back Button Unread Count</label>
                  <input type="text" value={config.unreadCount} onChange={e => setConfig({...config, unreadCount: e.target.value})} placeholder="e.g. 70" className="w-full border p-2 rounded" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Chat Name</label>
                  <input type="text" value={config.chatName} onChange={e => setConfig({...config, chatName: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div className="col-span-2">
                  <label className="block text-sm font-medium text-gray-600 mb-1">Subtitle / Members</label>
                  <input type="text" value={config.members} onChange={e => setConfig({...config, members: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div className="col-span-2 flex space-x-4">
                  <div className="w-1/2">
                    <label className="block text-sm font-medium text-gray-600 mb-1">Group Profile Icon</label>
                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, (url) => setConfig({...config, groupIcon: url}))} className="w-full border p-2 rounded bg-white" />
                  </div>
                  <div className="w-1/2">
                    <label className="block text-sm font-medium text-blue-600 mb-1">Global Chat Scale: {config.chatScale}x</label>
                    <input 
                      type="range" 
                      min="0.5" max="1.5" step="0.05" 
                      value={config.chatScale || 1.0} 
                      onChange={e => setConfig({...config, chatScale: parseFloat(e.target.value)})} 
                      className="w-full mt-2" 
                    />
                  </div>
                </div>
              </div>
            </div>

            <div>
              {/* Top Add Buttons & Collapse Toggle */}
              <div className="flex justify-between items-center mb-4">
                <h2 className="font-bold text-lg text-gray-700">Messages</h2>
                <div className="flex space-x-2 items-center">
                  <button onClick={() => setIsCollapsed(!isCollapsed)} className="bg-purple-100 border border-purple-300 text-purple-800 px-3 py-1 rounded shadow-sm text-sm font-medium mr-2">
                    {isCollapsed ? 'Expand All' : 'Collapse All'}
                  </button>
                  <button onClick={() => addMessage('me')} className="bg-[#DCF7C5] border border-green-300 text-green-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Me</button>
                  <button onClick={() => addMessage('other')} className="bg-gray-200 border border-gray-300 text-gray-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Other</button>
                </div>
              </div>

              {/* DRAGGABLE MESSAGES LIST */}
              {messages.map((msg, index) => {
                const isDragged = draggedIdx === index;
                const isDragOver = dragOverIdx === index;
                const isDraggingDown = draggedIdx !== null && dragOverIdx !== null && draggedIdx < dragOverIdx;
                const isDraggingUp = draggedIdx !== null && dragOverIdx !== null && draggedIdx > dragOverIdx;

                return (
                  <div 
                    key={msg.id} 
                    draggable={draggableId === msg.id}
                    onDragStart={(e) => handleDragStart(e, index)}
                    onDragOver={(e) => handleDragOver(e, index)}
                    onDrop={(e) => handleDrop(e, index)}
                    onDragEnd={handleDragEnd}
                    className={`mb-4 rounded-xl relative transition-all duration-200 ${
                      isDragged ? 'opacity-40 bg-gray-200 border-dashed border-2' : ''
                    }`}
                  >
                    {/* Drop Target Space (Top/Before) */}
                    {isDragOver && isDraggingUp && (
                        <div className={`w-full bg-blue-50 border-2 border-dashed border-blue-400 rounded-xl mb-2 flex items-center justify-center pointer-events-none transition-all ${isCollapsed ? 'h-12' : 'h-24'}`}>
                            <span className="text-blue-500 font-bold text-sm tracking-wide">Drop Before</span>
                        </div>
                    )}

                    {/* Main Message Content */}
                    <div className={`border rounded-xl relative transition-all ${
                        isDragged ? 'border-transparent' : 'bg-gray-50 border-gray-200 shadow-sm'
                    } ${
                        isCollapsed ? 'py-2 px-3 flex items-center' : 'p-4'
                    }`}>
                      {isCollapsed ? (
                        // --- COLLAPSED VIEW ---
                        <>
                          <div 
                            className="cursor-grab active:cursor-grabbing text-gray-400 hover:text-blue-600 p-1 -ml-1 mr-2 rounded transition-colors"
                            onMouseEnter={() => setDraggableId(msg.id)}
                            onMouseLeave={() => setDraggableId(null)}
                            title="Drag to reorder"
                          >
                            <Icons.DragHandle />
                          </div>
                          <span className="font-bold text-sm text-gray-700 w-24 shrink-0 truncate">Msg {index + 1} ({msg.sender === 'me' ? 'You' : 'Other'})</span>
                          <span className="text-sm text-gray-500 truncate flex-1 px-3 border-l border-gray-300 ml-2">
                            {msg.text || (msg.hasImage ? (msg.isSticker ? '[Sticker Attached]' : '[Image Attached]') : '[Empty Message]')}
                          </span>
                          <button onClick={() => deleteMessage(msg.id)} className="text-red-400 hover:text-red-700 text-sm font-bold ml-2 p-1 px-2 rounded hover:bg-red-50">✕</button>
                        </>
                      ) : (
                        // --- EXPANDED VIEW (Original) ---
                        <>
                          <button onClick={() => deleteMessage(msg.id)} className="absolute top-2 right-2 text-red-500 hover:text-red-700 text-sm font-bold">✕ Remove</button>
                          
                          <div className="flex space-x-2 items-center mb-2 flex-wrap gap-y-2 pr-16">
                            
                            {/* Drag Handle */}
                            <div 
                              className="cursor-grab active:cursor-grabbing text-gray-400 hover:text-blue-600 p-1 -ml-1 rounded transition-colors"
                              onMouseEnter={() => setDraggableId(msg.id)}
                              onMouseLeave={() => setDraggableId(null)}
                              title="Drag to reorder"
                            >
                              <Icons.DragHandle />
                            </div>

                            <span className="font-bold text-sm text-gray-700 w-20 shrink-0 truncate">Msg {index + 1} ({msg.sender === 'me' ? 'You' : 'Other'})</span>
                            
                            {msg.sender === 'other' && (
                              <input 
                                type="text" 
                                placeholder="Sender Name" 
                                value={msg.senderName}
                                onChange={(e) => {
                                  const newMsgs = [...messages];
                                  newMsgs[index].senderName = e.target.value;
                                  setMessages(newMsgs);
                                }}
                                className="flex-1 border p-1 rounded text-sm font-semibold min-w-[100px]"
                                style={{ color: getColorForUser(msg.senderName) }} 
                              />
                            )}
                            <input 
                              type="text" 
                              placeholder="Time" 
                              value={msg.time}
                              onChange={(e) => {
                                const newMsgs = [...messages];
                                newMsgs[index].time = e.target.value;
                                setMessages(newMsgs);
                              }}
                              className="w-20 border p-1 rounded text-sm shrink-0"
                            />
                            <input 
                              type="text" 
                              placeholder="React (e.g. ❤️)" 
                              value={msg.reaction || ''}
                              onChange={(e) => {
                                const newMsgs = [...messages];
                                newMsgs[index].reaction = e.target.value;
                                setMessages(newMsgs);
                              }}
                              className="w-24 border p-1 rounded text-sm shrink-0"
                            />
                          </div>

                          <textarea 
                            placeholder="Message Text..."
                            value={msg.text}
                            onChange={(e) => {
                              const newMsgs = [...messages];
                              newMsgs[index].text = e.target.value;
                              setMessages(newMsgs);
                            }}
                            className="w-full border p-2 rounded mb-3 text-sm min-h-[50px]"
                          />
                          
                          <div className="grid grid-cols-2 gap-4">
                            <div className="flex flex-col space-y-1">
                              <span className="text-xs font-semibold text-gray-600">Attach Standard Photo:</span>
                              <input 
                                type="file" 
                                accept="image/*"
                                onChange={(e) => handleImageUpload(e, (url) => {
                                  const newMsgs = [...messages];
                                  newMsgs[index].hasImage = true;
                                  newMsgs[index].isSticker = false;
                                  newMsgs[index].imageUrl = url;
                                  setMessages(newMsgs);
                                })}
                                className="text-xs bg-white border rounded p-1 w-full"
                              />
                            </div>
                            <div className="flex flex-col space-y-1">
                              <span className="text-xs font-semibold text-gray-600">Attach Sticker (No bg):</span>
                              <input 
                                type="file" 
                                accept="image/*"
                                onChange={(e) => handleImageUpload(e, (url) => {
                                  const newMsgs = [...messages];
                                  newMsgs[index].hasImage = true;
                                  newMsgs[index].isSticker = true;
                                  newMsgs[index].imageUrl = url;
                                  setMessages(newMsgs);
                                })}
                                className="text-xs bg-white border rounded p-1 w-full"
                              />
                            </div>
                          </div>

                          {msg.sender === 'other' && (
                            <div className="mt-3 flex flex-col space-y-1 bg-white p-2 rounded border border-blue-100">
                              <span className="text-xs font-semibold text-blue-600">User's Avatar (Only needed on 1 message per person):</span>
                              <input 
                                type="file" 
                                accept="image/*"
                                onChange={(e) => handleImageUpload(e, (url) => {
                                  const newMsgs = [...messages];
                                  newMsgs[index].avatarUrl = url;
                                  setMessages(newMsgs);
                                })}
                                className="text-xs w-full"
                              />
                            </div>
                          )}
                        </>
                      )}
                    </div>

                    {/* Drop Target Space (Bottom/After) */}
                    {isDragOver && isDraggingDown && (
                        <div className={`w-full bg-blue-50 border-2 border-dashed border-blue-400 rounded-xl mt-2 flex items-center justify-center pointer-events-none transition-all ${isCollapsed ? 'h-12' : 'h-24'}`}>
                            <span className="text-blue-500 font-bold text-sm tracking-wide">Drop After</span>
                        </div>
                    )}
                  </div>
                );
              })}

              {/* Bottom Add Buttons (Convenience Duplicate) */}
              <div className="flex justify-end items-center mt-2 mb-8">
                <div className="space-x-2">
                  <button onClick={() => addMessage('me')} className="bg-[#DCF7C5] border border-green-300 text-green-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Me</button>
                  <button onClick={() => addMessage('other')} className="bg-gray-200 border border-gray-300 text-gray-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Other</button>
                </div>
              </div>

            </div>
          </div>

          {/* RIGHT PANE: Live Preview */}
          <div className="w-1/2 p-6 bg-[#d1d5db] flex justify-center items-center overflow-y-auto">
            {/* Added id="mockup-container" so the export script can find it */}
            <div id="mockup-container" className="w-[393px] h-[852px] bg-white rounded-[3rem] shadow-2xl border-[12px] border-black flex flex-col relative overflow-hidden ring-1 ring-gray-900/10">
              
              {/* iOS Status Bar */}
              <div className="h-12 bg-[#F6F6F6] text-black pl-8 pr-[22px] flex justify-between items-center text-[15px] font-semibold z-10 pt-2 shrink-0">
                <span>{config.osTime}</span>
                <div id="notch-placeholder" className="absolute top-2 left-1/2 -translate-x-1/2 w-[120px] h-[30px] bg-black rounded-full"></div>
                <div className="flex items-center space-x-[4px]">
                  <Icons.Cellular />
                  {config.networkType && <span className="text-[12px] font-bold">{config.networkType}</span>}
                  <Icons.Battery />
                </div>
              </div>

              {/* WhatsApp Header */}
              <div className="bg-[#F6F6F6] border-b border-gray-300 px-1 py-2 flex items-center justify-between z-10 relative shadow-sm shrink-0">
                <div className="flex items-center cursor-pointer">
                  <div className="flex items-center text-[#007AFF] px-1">
                    <Icons.ChevronLeft />
                    {config.unreadCount && <span className="text-[17px] mr-1.5">{config.unreadCount}</span>}
                  </div>
                  <div className="w-10 h-10 bg-gray-300 rounded-full overflow-hidden mr-3">
                    {config.groupIcon ? <img src={config.groupIcon} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-gray-400"></div>}
                  </div>
                  <div className="flex flex-col">
                    <span className="font-semibold text-[16px] leading-tight text-black tracking-tight">{config.chatName}</span>
                    <span className="text-gray-500 text-[13px] truncate w-[130px]">{config.members}</span>
                  </div>
                </div>
                <div className="flex space-x-6 px-3">
                  <Icons.VideoWithArrow />
                </div>
              </div>

              {/* Chat Body */}
              <div className="flex-1 pl-1 pr-3 pt-3 overflow-y-auto pb-20 relative wa-bg">
                {/* Scale Wrapper for the chat contents */}
                <div id="scale-wrapper" style={{ transform: `scale(${config.chatScale || 1.0})`, transformOrigin: 'top left', width: `${100 / (config.chatScale || 1.0)}%` }}>
                  {groupedMessages.map((block) => {
                    
                    // --- PAIRED STICKER RENDER ---
                    if (block.isPair) {
                      const { msg1, msg2, index1, index2 } = block;
                      const isMe = msg1.sender === 'me';
                      
                      let isFirstInGroup = false;
                      if (index1 === 0) isFirstInGroup = true;
                      else {
                        const prev = messages[index1 - 1];
                        if (prev.sender !== msg1.sender || (!isMe && prev.senderName !== msg1.senderName) || prev.isSticker) isFirstInGroup = true;
                      }

                      let isLastInGroup = false;
                      if (index2 === messages.length - 1) isLastInGroup = true;
                      else {
                        const next = messages[index2 + 1];
                        if (next.sender !== msg2.sender || (!isMe && next.senderName !== msg2.senderName) || next.isSticker) isLastInGroup = true;
                      }

                      const senderAvatar = !isMe ? getAvatarForSender(msg1.senderName) : null;
                      const hasReaction = !!msg1.reaction || !!msg2.reaction;

                      return (
                        <div key={`${msg1.id}-${msg2.id}`} className={`flex ${isMe ? 'justify-end' : 'justify-start items-end'} ${isFirstInGroup ? 'mt-3' : 'mt-1'} ${hasReaction ? 'mb-[14px]' : ''}`}>
                          {/* Avatar Render */}
                          {!isMe && (
                            <div className="w-[30px] h-[30px] rounded-full overflow-hidden mr-1.5 shrink-0 mb-0.5">
                              {isLastInGroup && (
                                senderAvatar ? <img src={senderAvatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-transparent"></div>
                              )}
                            </div>
                          )}
                          <div className="flex flex-col max-w-[80%]">
                            {/* Sticker Pair Colored Name Header */}
                            {!isMe && isFirstInGroup && (
                              <div 
                                className="text-[13px] font-medium leading-none bg-white shadow-[0_1px_1px_rgba(0,0,0,0.1)] rounded-full px-2.5 py-1.5 -mb-2 relative z-10 w-max"
                                style={{ color: getColorForUser(msg1.senderName) }}
                              >
                                {msg1.senderName}
                              </div>
                            )}
                            <div className="flex flex-row space-x-1.5 relative">
                              {/* Sticker 1 */}
                              <div className="flex flex-col">
                                <div className="relative">
                                  <img src={msg1.imageUrl} alt="sticker" className="w-[110px] h-[110px] object-contain drop-shadow-md" />
                                  {msg1.reaction && (
                                    <div className="absolute -bottom-1.5 right-1 bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center">
                                      {msg1.reaction}
                                    </div>
                                  )}
                                </div>
                                <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] -mt-1.5 relative z-10`}>
                                  <span className={`${!isMe ? 'bg-white/90 shadow-sm px-1.5 py-[2px] rounded-full text-gray-500' : 'bg-white/50 px-1.5 py-[2px] rounded-full shadow-sm text-gray-500'}`}>{msg1.time}</span>
                                  {isMe && <Tick status={msg1.status} />}
                                </div>
                              </div>
                              {/* Sticker 2 */}
                              <div className="flex flex-col">
                                <div className="relative">
                                  <img src={msg2.imageUrl} alt="sticker" className="w-[110px] h-[110px] object-contain drop-shadow-md" />
                                  {msg2.reaction && (
                                    <div className="absolute -bottom-1.5 right-1 bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center">
                                      {msg2.reaction}
                                    </div>
                                  )}
                                </div>
                                <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] -mt-1.5 relative z-10`}>
                                  <span className={`${!isMe ? 'bg-white/90 shadow-sm px-1.5 py-[2px] rounded-full text-gray-500' : 'bg-white/50 px-1.5 py-[2px] rounded-full shadow-sm text-gray-500'}`}>{msg2.time}</span>
                                  {isMe && <Tick status={msg2.status} />}
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    } 
                    
                    // --- SINGLE MESSAGE / SINGLE STICKER RENDER ---
                    else {
                      const { msg, index } = block;
                      const isMe = msg.sender === 'me';
                      
                      let isFirstInGroup = false;
                      if (index === 0) {
                        isFirstInGroup = true;
                      } else {
                        const prev = messages[index - 1];
                        if (prev.sender !== msg.sender || (!isMe && prev.senderName !== msg.senderName)) {
                          isFirstInGroup = true;
                        } else if (msg.isSticker || prev.isSticker) {
                          isFirstInGroup = true;
                        }
                      }

                      let isLastInGroup = false;
                      if (index === messages.length - 1) {
                        isLastInGroup = true;
                      } else {
                        const next = messages[index + 1];
                        if (next.sender !== msg.sender || (!isMe && next.senderName !== msg.senderName)) {
                          isLastInGroup = true;
                        } else if (msg.isSticker || next.isSticker) {
                          isLastInGroup = true;
                        }
                      }
                      
                      const senderAvatar = !isMe ? getAvatarForSender(msg.senderName) : null;
                      const bubblePadding = msg.isSticker ? '' : (msg.hasImage ? (msg.text ? 'p-1 pb-1.5' : 'p-1 pb-1') : 'px-3 pt-2 pb-1.5');
                      const hasReaction = !!msg.reaction;

                      return (
                        <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start items-end'} ${isFirstInGroup ? 'mt-3' : 'mt-1'} ${hasReaction ? 'mb-[14px]' : ''}`}>
                          {/* Avatar Render */}
                          {!isMe && (
                            <div className="w-[30px] h-[30px] rounded-full overflow-hidden mr-1.5 shrink-0 mb-0.5">
                              {isLastInGroup && (
                                senderAvatar ? <img src={senderAvatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-transparent"></div>
                              )}
                            </div>
                          )}

                          {/* Message Bubble Wrapper - All 4 corners rounded */}
                          <div className={`max-w-[75%] relative flex flex-col ${msg.isSticker ? 'bg-transparent' : (isMe ? 'bg-[#DCF7C5]' : 'bg-white')} ${!msg.isSticker ? `shadow-sm rounded-[12px] ${bubblePadding}` : ''}`}>
                            
                            {/* Dynamic Colored Name Header */}
                            {!isMe && isFirstInGroup && (
                              <div 
                                className={`text-[14px] font-medium leading-none ${msg.isSticker ? 'bg-white shadow-[0_1px_1px_rgba(0,0,0,0.1)] rounded-full px-2.5 py-1.5 -mb-2 relative z-10 w-max text-[13px]' : `mb-1 ${msg.hasImage ? 'ml-[8px] mt-[4px]' : ''}`}`}
                                style={{ color: getColorForUser(msg.senderName) }}
                              >
                                {msg.senderName}
                              </div>
                            )}

                            {/* Standard Photo */}
                            {!msg.isSticker && msg.hasImage && msg.imageUrl && (
                              <div className="relative">
                                <img src={msg.imageUrl} alt="attached" className={`w-full max-h-56 object-cover rounded-[8px] ${msg.text ? 'mb-1' : ''}`} />
                                {/* Overlay time if no text is provided */}
                                {!msg.text && (
                                  <div className="absolute bottom-1 right-1.5 bg-black/30 text-white text-[11px] px-[6px] py-[3px] rounded-full flex items-center drop-shadow-sm">
                                    <span>{msg.time}</span>
                                    {isMe && <div className="flex"><Tick status={msg.status} isOverlay={true} /></div>}
                                  </div>
                                )}
                              </div>
                            )}

                            {/* Sticker Rendering */}
                            {msg.isSticker && msg.hasImage && msg.imageUrl && (
                              <div className="flex flex-col">
                                <div className="relative">
                                  <img src={msg.imageUrl} alt="sticker" className="w-[130px] h-[130px] object-contain drop-shadow-md" />
                                  {msg.reaction && (
                                    <div className="absolute -bottom-1.5 right-1 bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center">
                                      {msg.reaction}
                                    </div>
                                  )}
                                </div>
                                <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] -mt-1.5 relative z-10`}>
                                  <span className={`${!isMe ? 'bg-white/90 shadow-sm px-1.5 py-[2px] rounded-full text-gray-500' : 'bg-white/50 px-1.5 py-[2px] rounded-full shadow-sm text-gray-500'}`}>{msg.time}</span>
                                  {isMe && <Tick status={msg.status} />}
                                </div>
                              </div>
                            )}

                            {/* Standard Text Rendering (With Mentions) */}
                            {!msg.isSticker && msg.text && (
                              <div className={`relative min-w-[70px] ${msg.hasImage ? 'px-1 pb-1' : ''}`}>
                                <span className="text-[16px] text-black leading-[1.35] tracking-[-0.4px] whitespace-pre-wrap inline break-words mr-1">
                                  {renderTextWithMentions(msg.text)}
                                </span>
                                <div className="inline-flex items-center justify-end text-[11px] text-gray-500 float-right ml-1 mt-[5px] h-[15px]">
                                  <span className="mt-[1px]">{msg.time}</span>
                                  {isMe && <Tick status={msg.status} />}
                                </div>
                                <div className="clear-both"></div>
                              </div>
                            )}
                            
                            {/* Standard Bubble Reaction */}
                            {!msg.isSticker && msg.reaction && (
                              <div className={`absolute -bottom-3 ${isMe ? 'right-1' : 'right-1'} bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center`}>
                                {msg.reaction}
                              </div>
                            )}

                          </div>
                        </div>
                      );
                    }
                  })}
                </div>
              </div>

              {/* Input Area */}
              <div className="h-[85px] bg-[#F6F6F6] border-t border-gray-300 flex items-start pt-2 px-3 space-x-3 z-10 pb-8 shrink-0">
                <div className="mt-1">
                  <Icons.Plus />
                </div>
                <div className="flex-1 bg-white border border-gray-300 rounded-full h-[34px] flex items-center px-3 justify-between shadow-sm mt-0.5">
                  <span className="text-gray-400 text-[15px] pt-0.5 tracking-tight">Message</span>
                  <Icons.Sticker />
                </div>
                <div className="mt-1">
                  <Icons.Camera />
                </div>
                <div className="mt-1">
                  <Icons.Mic />
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WhatsAppGenerator />);
  </script>
</body>
</html>
