<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local WhatsApp Mockup Editor V26</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Force Apple System Font */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    /* Light Mode Background */
    .wa-bg {
      background-color: #E5DDD5;
      /* Authentic WhatsApp Doodle Pattern */
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: 400px auto;
      background-repeat: repeat;
      background-blend-mode: multiply;
    }

    /* Dark Mode Background */
    .wa-bg-dark {
      background-color: #131313;
      background-image: 
        linear-gradient(rgba(19, 19, 19, 0.92), rgba(19, 19, 19, 0.92)), 
        url('https://camo.githubusercontent.com/c42c83df2fd1e442ef1e0ed69cc20d21f65308fc2f0dca2a8035360738d49c8c/68747470733a2f2f7765622e77686174736170702e636f6d2f696d672f62672d636861742d74696c652d6461726b5f61346265353132653731393562366237333364393131306234303866303735642e706e67');
      background-size: auto, 400px auto;
      background-repeat: repeat, repeat;
      background-blend-mode: normal, screen;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Authentic WhatsApp Group Colors ---
    const WA_COLORS = [
      '#EA0070', '#35CD96', '#539BF1', '#FF8A00', 
      '#CB87D6', '#91AB01', '#007AFF', '#DF7A9E', 
      '#E542A3', '#6BCBE6', '#F2A900', '#00A36C'
    ];

    // --- Dynamically Colored Icons ---
    const Icons = {
      ChevronLeft: ({ color = "#007AFF" }) => (
        <svg viewBox="0 0 14 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-[14px] h-[22px] mr-1">
          <path d="M11 4L2.5 12L11 20" />
        </svg>
      ),
      VideoWithArrow: ({ color = "#007AFF" }) => (
        <svg viewBox="0 0 34 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[36px] h-[24px]">
          <path d="M3 8.5C3 7.11929 4.11929 6 5.5 6H15.5C16.8807 6 18 7.11929 18 8.5V15.5C18 16.8807 16.8807 18 15.5 18H5.5C4.11929 18 3 16.8807 3 15.5V8.5Z" />
          <polygon points="18 10.5 24 7.5 24 16.5 18 13.5" strokeLinejoin="round" />
          <path d="M28 11L30.5 13.5L33 11" strokeWidth="1.5" />
        </svg>
      ),
      Plus: ({ color = "#007AFF" }) => (
        <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[26px] h-[26px]">
          <line x1="12" y1="4" x2="12" y2="20" />
          <line x1="4" y1="12" x2="20" y2="12" />
        </svg>
      ),
      Camera: ({ color = "#007AFF" }) => (
        <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[24px] h-[24px]">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.5l1.5-2.5h6l1.5 2.5H20a2 2 0 0 1 2 2z" />
          <circle cx="12" cy="13" r="3.5" />
        </svg>
      ),
      Mic: ({ color = "#007AFF" }) => (
        <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[22px] h-[22px]">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        </svg>
      ),
      Sticker: ({ color = "#8E8E93" }) => (
        <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[20px] h-[20px]">
          <path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z" />
          <path d="M15 3v6h6" />
        </svg>
      ),
      Cellular: ({ color = "currentColor" }) => (
        <svg viewBox="0 0 18 12" fill={color} className="w-[16px] h-[11px]">
          <rect x="0" y="9" width="3" height="3" rx="1" />
          <rect x="5" y="6" width="3" height="6" rx="1" />
          <rect x="10" y="3" width="3" height="9" rx="1" />
          <rect x="15" y="0" width="3" height="12" rx="1" />
        </svg>
      ),
      Battery: ({ color = "currentColor" }) => (
        <svg viewBox="0 0 25 12" fill="none" className="w-[24px] h-[12px] relative top-[-0.5px]">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke={color} strokeWidth="1"/>
          <rect x="2" y="2" width="18" height="8" rx="2" fill={color}/>
          <path d="M23 4.5C23.5523 4.5 24 4.94772 24 5.5V6.5C24 7.05228 23.5523 7.5 23 7.5" fill={color}/>
        </svg>
      ),
      DragHandle: () => (
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <circle cx="4" cy="6" r="1"></circle>
          <circle cx="4" cy="12" r="1"></circle>
          <circle cx="4" cy="18" r="1"></circle>
        </svg>
      )
    };

    function WhatsAppGenerator() {
      const [config, setConfig] = useState({
        osTime: '8:18',
        unreadCount: '70',
        networkType: 'LTE',
        chatName: 'Group Name',
        chatType: 'group',
        members: 'Timothy, Samuel, ...',
        groupIcon: '',
        chatScale: 1.0, 
        isDarkMode: false, 
      });

      const [messages, setMessages] = useState([
        {
          id: 1,
          sender: 'other',
          senderName: 'Username',
          text: 'Text message',
          time: '6:19 AM', 
          hasImage: false,
          isSticker: false,
          imageUrl: '',
          avatarUrl: '',
          reaction: '',
          status: 'read'
        }
      ]);

      // --- Unsaved Changes Tracker ---
      const [lastSavedState, setLastSavedState] = useState('');
      
      useEffect(() => {
        setLastSavedState(JSON.stringify({config, messages}));
      }, []);

      useEffect(() => {
        const handleBeforeUnload = (e) => {
          const currentState = JSON.stringify({config, messages});
          if (currentState !== lastSavedState) {
            e.preventDefault();
            e.returnValue = ''; 
          }
        };
        window.addEventListener('beforeunload', handleBeforeUnload);
        return () => window.removeEventListener('beforeunload', handleBeforeUnload);
      }, [config, messages, lastSavedState]);


      // --- UI States ---
      const [isCollapsed, setIsCollapsed] = useState(false);

      // --- Drag & Drop States & Refs ---
      const [draggableId, setDraggableId] = useState(null);
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      
      const editorPaneRef = useRef(null);
      const scrollIntervalId = useRef(null);

      const clearAutoScroll = () => {
        if (scrollIntervalId.current) {
          clearInterval(scrollIntervalId.current);
          scrollIntervalId.current = null;
        }
      };

      const handlePaneDragOver = (e) => {
        e.preventDefault(); 
        const pane = editorPaneRef.current;
        if (!pane || draggedIdx === null) return;

        const threshold = 100;
        const rect = pane.getBoundingClientRect();
        
        if (e.clientY < rect.top + threshold) {
          if (!scrollIntervalId.current) {
            scrollIntervalId.current = setInterval(() => {
              pane.scrollTop -= 15;
            }, 20);
          }
        } else if (e.clientY > rect.bottom - threshold) {
          if (!scrollIntervalId.current) {
            scrollIntervalId.current = setInterval(() => {
              pane.scrollTop += 15;
            }, 20);
          }
        } else {
          clearAutoScroll();
        }
      };

      const handleDragStart = (e, index) => {
        setDraggedIdx(index);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index);
      };

      const handleItemDragOver = (e, index) => {
        e.preventDefault();
        setDragOverIdx(index);
      };

      const handleDrop = (e, dropIndex) => {
        e.preventDefault();
        clearAutoScroll();
        if (draggedIdx === null || draggedIdx === dropIndex) {
          setDragOverIdx(null);
          return;
        }
        const newMessages = [...messages];
        const draggedMsg = newMessages[draggedIdx];
        newMessages.splice(draggedIdx, 1);
        newMessages.splice(dropIndex, 0, draggedMsg);
        setMessages(newMessages);
        setDraggedIdx(null);
        setDragOverIdx(null);
        setDraggableId(null);
      };

      const handleDragEnd = () => {
        clearAutoScroll();
        setDraggedIdx(null);
        setDragOverIdx(null);
        setDraggableId(null);
      };

      const handleImageUpload = (e, callback) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            callback(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const exportDataJSON = () => {
        const data = { config, messages };
        const dataStr = JSON.stringify(data, null, 2);
        setLastSavedState(dataStr);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-mockup-export.json';
        a.click();
      };

      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.config) setConfig({...config, ...data.config}); 
            if (data.messages) setMessages(data.messages);
            setLastSavedState(JSON.stringify(data));
          } catch (err) {
            alert('Invalid JSON file format.');
          }
        };
        reader.readAsText(file);
      };

      // --- Modal / Preflight State ---
      const [showExportModal, setShowExportModal] = useState(false);
      const [showStoryboardPreflight, setShowStoryboardPreflight] = useState(false);
      const [storyboardPages, setStoryboardPages] = useState([]);
      const previewContainerRef = useRef(null);

      // --- HTML EXPORT STYLES INJECTION ---
      const sharedStyles = `
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6; 
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .wa-bg {
      background-color: #E5DDD5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: 400px auto;
      background-repeat: repeat;
      background-blend-mode: multiply;
    }
    .wa-bg-dark {
      background-color: #131313;
      background-image: 
        linear-gradient(rgba(19, 19, 19, 0.92), rgba(19, 19, 19, 0.92)), 
        url('https://camo.githubusercontent.com/c42c83df2fd1e442ef1e0ed69cc20d21f65308fc2f0dca2a8035360738d49c8c/68747470733a2f2f7765622e77686174736170702e636f6d2f696d672f62672d636861742d74696c652d6461726b5f61346265353132653731393562366237333364393131306234303866303735642e706e67');
      background-size: auto, 400px auto;
      background-repeat: repeat, repeat;
      background-blend-mode: normal, screen;
    }
      `;

      // --- EXPORT GENERATORS ---
      const generateInteractiveHTML = () => {
        const mockupNode = document.getElementById('mockup-container');
        if (!mockupNode) return;
        const clone = mockupNode.cloneNode(true);
        const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>${config.chatName} - Interactive</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    ${sharedStyles}
    @media (max-width: 450px) {
      #mockup-container { transform: scale(0.85); transform-origin: top center; }
    }
  </style>
</head>
<body>${clone.outerHTML}</body>
</html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-interactive.html';
        a.click();
        setShowExportModal(false);
      };

      const generateLongCaptureHTML = () => {
        const mockupNode = document.getElementById('mockup-container');
        if (!mockupNode) return;
        const clone = mockupNode.cloneNode(true);
        clone.className = clone.className.replace('h-[852px]', 'h-auto min-h-[852px]');
        const chatBody = clone.querySelector('.overflow-y-auto');
        if (chatBody) chatBody.className = chatBody.className.replace('overflow-y-auto', 'overflow-visible');

        const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>${config.chatName} - Full Capture</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    ${sharedStyles}
    body { padding: 40px 20px; align-items: flex-start; }
  </style>
</head>
<body>${clone.outerHTML}</body>
</html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-full-capture.html';
        a.click();
        setShowExportModal(false);
      };

      const calculateStoryboardPages = () => {
        const sourceContainer = document.getElementById('scale-wrapper');
        if (!sourceContainer) return;
        
        const rawMessageHTMLs = Array.from(sourceContainer.children).map(node => ({
            html: node.outerHTML,
            height: node.offsetHeight + parseInt(window.getComputedStyle(node).marginTop || 0)
        }));

        const pages = [];
        let currentPage = [];
        let currentHeight = 0;
        const MAX_HEIGHT = 640 / config.chatScale; 

        rawMessageHTMLs.forEach(msg => {
            if (currentHeight + msg.height > MAX_HEIGHT && currentPage.length > 0) {
                pages.push([...currentPage]);
                currentPage = [msg.html];
                currentHeight = msg.height;
            } else {
                currentPage.push(msg.html);
                currentHeight += msg.height;
            }
        });
        if (currentPage.length > 0) pages.push(currentPage);
        
        setStoryboardPages(pages);
        setShowExportModal(false);
        setShowStoryboardPreflight(true);
      };

      const downloadStoryboardHTML = () => {
        const mockupNode = document.getElementById('mockup-container');
        if (!mockupNode) return;
        const cloneStory = mockupNode.cloneNode(true);
        const statusBarHTML = cloneStory.children[0].outerHTML.replace('id="notch-placeholder"', 'style="display:none;"');
        const headerHTML = cloneStory.children[1].outerHTML;
        const footerHTML = cloneStory.children[3].outerHTML;

        const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>${config.chatName} - Storyboard</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    ${sharedStyles}
    body {
      padding: 40px;
      gap: 32px;
      overflow-x: auto;
      justify-content: flex-start;
    }
  </style>
</head>
<body>
    ${storyboardPages.map(pageMsgs => `
      <div class="w-[393px] h-[852px] ${config.isDarkMode ? 'bg-[#111111]' : 'bg-white'} rounded-[24px] border-4 border-gray-300 flex flex-col relative overflow-hidden shadow-md shrink-0">
        ${statusBarHTML}
        ${headerHTML}
        <div class="flex-1 pl-1 pr-3 pt-3 pb-20 relative ${config.isDarkMode ? 'wa-bg-dark' : 'wa-bg'} overflow-hidden">
            <div style="transform: scale(${config.chatScale}); transform-origin: top left; width: ${100/config.chatScale}%;">
                ${pageMsgs.join('')}
            </div>
        </div>
        ${footerHTML}
      </div>
    `).join('')}
</body>
</html>`;

        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-storyboard.html';
        a.click();
        setShowStoryboardPreflight(false);
      };

      const addMessage = (type) => {
        setMessages([...messages, {
          id: Date.now(),
          sender: type,
          senderName: type === 'other' ? 'New User' : 'You',
          text: '',
          time: config.osTime + ' AM', 
          hasImage: false,
          isSticker: false,
          imageUrl: '',
          avatarUrl: '',
          reaction: '',
          status: 'read'
        }]);
      };

      const deleteMessage = (id) => {
        setMessages(messages.filter(msg => msg.id !== id));
      };

      const getAvatarForSender = (senderName) => {
        const msgWithAvatar = messages.find(m => m.sender === 'other' && m.senderName === senderName && m.avatarUrl);
        return msgWithAvatar ? msgWithAvatar.avatarUrl : null;
      };

      const getColorForUser = (username) => {
        if (!username) return WA_COLORS[0];
        let hash = 0;
        for (let i = 0; i < username.length; i++) {
          hash = username.charCodeAt(i) + ((hash << 5) - hash);
        }
        const index = Math.abs(hash) % WA_COLORS.length;
        return WA_COLORS[index];
      };

      const renderTextWithMentions = (text) => {
        if (!text) return null;
        const parts = text.split(/(@[^\s,?!]+)/g);
        return parts.map((part, i) => {
          if (part.startsWith('@')) {
            // Highlight color adapts to dark mode
            return <span key={i} className={config.isDarkMode ? "text-[#53bdeb]" : "text-[#007AFF]"}>{part}</span>;
          }
          return part;
        });
      };

      const Tick = ({ status, isOverlay }) => {
        // WhatsApp Dark Mode uses bright blue for read ticks, grey for unread.
        const readColor = config.isDarkMode ? '#3EACF7' : '#34B7F1';
        const unreadColor = '#8696A0';
        const color = status === 'read' ? readColor : (isOverlay ? '#FFFFFF' : unreadColor);
        const opacity = isOverlay && status !== 'read' ? 'opacity-100' : 'opacity-80';
        
        if (status === 'sent') {
          return (
            <svg viewBox="0 0 16 15" width="16" height="14" className={`ml-[1px] ${opacity}`}>
              <path d="M10.9 4.3L6.5 10.1L4 7.2" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          );
        }
        return (
          <svg viewBox="0 0 16 15" width="18" height="14" className={`ml-[1px] ${opacity}`}>
            <path d="M10.9 4.3L6.5 10.1L4 7.2" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M15 4.3L10.6 10.1L9 8" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        );
      };

      // Grouping Logic for Sticker Pairs
      const groupedMessages = [];
      for (let i = 0; i < messages.length; i++) {
        if (
          messages[i].isSticker && 
          i + 1 < messages.length && 
          messages[i+1].isSticker && 
          messages[i].sender === messages[i+1].sender && 
          messages[i].senderName === messages[i+1].senderName
        ) {
          groupedMessages.push({ isPair: true, msg1: messages[i], msg2: messages[i+1], index1: i, index2: i + 1 });
          i++; 
        } else {
          groupedMessages.push({ isPair: false, msg: messages[i], index: i });
        }
      }

      // Dynamic Colors based on Dark Mode
      const iconActiveColor = config.isDarkMode ? '#ffffff' : '#007AFF';
      const iconMutedColor = config.isDarkMode ? '#8696a0' : '#8E8E93';
      const iconInputColor = config.isDarkMode ? '#8696a0' : '#007AFF';

      return (
        <div className="flex h-screen bg-gray-100">
          
          {/* --- EXPORT MODAL --- */}
          {showExportModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
                    <h3 className="text-xl font-bold mb-4 text-gray-800">Export HTML Format</h3>
                    <p className="text-gray-600 mb-6 text-sm">Choose how you want your mockup to be displayed in the exported file.</p>
                    
                    <div className="space-y-3">
                        <button onClick={generateInteractiveHTML} className="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition-all flex flex-col group">
                            <span className="font-bold text-gray-800 group-hover:text-blue-700">📱 Interactive Scroll</span>
                            <span className="text-xs text-gray-500 mt-1">Standard iPhone frame. Scroll inside to read.</span>
                        </button>
                        <button onClick={generateLongCaptureHTML} className="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition-all flex flex-col group">
                            <span className="font-bold text-gray-800 group-hover:text-blue-700">📏 Full Length Capture</span>
                            <span className="text-xs text-gray-500 mt-1">One very long screen. Best for screenshot extensions.</span>
                        </button>
                        <button onClick={calculateStoryboardPages} className="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-purple-500 hover:bg-purple-50 transition-all flex flex-col group">
                            <span className="font-bold text-gray-800 group-hover:text-purple-700">📖 Paginated Storyboard</span>
                            <span className="text-xs text-gray-500 mt-1">Side-by-side screens. Best for presentations.</span>
                        </button>
                    </div>

                    <button onClick={() => setShowExportModal(false)} className="mt-6 w-full py-2 text-gray-500 hover:bg-gray-100 rounded-lg font-medium transition-colors">
                        Cancel
                    </button>
                </div>
            </div>
          )}

          {/* --- STORYBOARD PREFLIGHT OVERLAY --- */}
          {showStoryboardPreflight && (
            <div className="fixed inset-0 z-50 flex flex-col bg-gray-900">
                <div className="bg-white p-4 flex justify-between items-center shadow-md z-10 shrink-0">
                    <div>
                        <h3 className="text-lg font-bold text-gray-800">Storyboard Preview</h3>
                        <p className="text-sm text-gray-500">Global Scale: {config.chatScale}x. Check page breaks below.</p>
                    </div>
                    <div className="space-x-3">

                    // --- PAIRED STICKER RENDER ---
                    if (block.isPair) {
                      const { msg1, msg2, index1, index2 } = block;
                      const isMe = msg1.sender === 'me';
                      
                      let isFirstInGroup = false;
                      if (index1 === 0) isFirstInGroup = true;
                      else {
                        const prev = messages[index1 - 1];
                        if (prev.sender !== msg1.sender || (!isMe && prev.senderName !== msg1.senderName) || prev.isSticker) isFirstInGroup = true;
                      }

                      let isLastInGroup = false;
                      if (index2 === messages.length - 1) isLastInGroup = true;
                      else {
                        const next = messages[index2 + 1];
                        if (next.sender !== msg2.sender || (!isMe && next.senderName !== msg2.senderName) || next.isSticker) isLastInGroup = true;
                      }

                      const senderAvatar = !isMe ? getAvatarForSender(msg1.senderName) : null;
                      const hasReaction = !!msg1.reaction || !!msg2.reaction;

                      return (
                        <div key={`${msg1.id}-${msg2.id}`} className={`flex ${isMe ? 'justify-end' : 'justify-start items-end'} ${isFirstInGroup ? 'mt-3' : 'mt-1'} ${hasReaction ? 'mb-[14px]' : ''}`}>

                            <div className="w-[30px] h-[30px] rounded-full overflow-hidden mr-1.5 shrink-0 mb-0.5">

                                senderAvatar ? <img src={senderAvatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-transparent"></div>
                              )}
                            </div>
                          )}
                          <div className="flex flex-col max-w-[80%]">
                            {/* Sticker Pair Colored Name Header */}

                              <div 
                                className={`text-[13px] font-medium leading-none ${config.isDarkMode ? 'bg-[#242625]' : 'bg-white'} shadow-[0_1px_1px_rgba(0,0,0,0.1)] rounded-full px-2.5 py-1.5 -mb-2 relative z-10 w-max`}
                                style={{ color: getColorForUser(msg1.senderName) }}
                              >
                                {msg1.senderName}
                              </div>
                            )}
                            <div className="flex flex-row space-x-1.5 relative">
                              {/* Sticker 1 */}
                              <div className="flex flex-col">
                                <div className="relative">
                                  <img src={msg1.imageUrl} alt="sticker" className="w-[110px] h-[110px] object-contain drop-shadow-md" />

                                    <div className={`absolute -bottom-1.5 right-1 ${config.isDarkMode ? 'bg-[#2A2A2A] border-[#141414] text-[#e9edef]' : 'bg-white border-gray-200 text-black'} shadow-sm border rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center`}>
                                      {msg1.reaction}
                                    </div>
                                  )}
                                </div>
                                <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] -mt-1.5 relative z-10`}>
                                  <span className={`${config.isDarkMode ? (isMe ? 'bg-[#0C2617]/60 text-[#AABFB5]' : 'bg-[#111111]/60 text-[#8696a0]') : (isMe ? 'bg-white/50 text-gray-500' : 'bg-white/90 text-gray-500')} shadow-sm px-1.5 py-[2px] rounded-full text-[11px]`}>{msg1.time}</span>

                                </div>
                                <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] -mt-1.5 relative z-10`}>
                                  <span className={`${config.isDarkMode ? (isMe ? 'bg-[#0C2617]/60 text-[#AABFB5]' : 'bg-[#111111]/60 text-[#8696a0]') : (isMe ? 'bg-white/50 text-gray-500' : 'bg-white/90 text-gray-500')} shadow-sm px-1.5 py-[2px] rounded-full text-[11px]`}>{msg2.time}</span>
                                  {isMe && <Tick status={msg2.status} />}
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>

                      } else {
                        const prev = messages[index - 1];
                        if (prev.sender !== msg.sender || (!isMe && prev.senderName !== msg.senderName)) {
                          isFirstInGroup = true;
                        } else if (msg.isSticker || prev.isSticker) {
                          isFirstInGroup = true;
                        }
                      }

                      let isLastInGroup = false;
                      if (index === messages.length - 1) {
                        isLastInGroup = true;
                      } else {
                        const next = messages[index + 1];
                        if (next.sender !== msg.sender || (!isMe && next.senderName !== msg.senderName)) {
                          isLastInGroup = true;
                        } else if (msg.isSticker || next.isSticker) {
                          isLastInGroup = true;
                        }
                      }
                      
                      const senderAvatar = !isMe ? getAvatarForSender(msg.senderName) : null;
                      const bubblePadding = msg.isSticker ? '' : (msg.hasImage ? (msg.text ? 'p-1 pb-1.5' : 'p-1 pb-1') : 'px-3 pt-2 pb-1.5');
                      const hasReaction = !!msg.reaction;

                      return (
                        <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start items-end'} ${isFirstInGroup ? 'mt-3' : 'mt-1'} ${hasReaction ? 'mb-[14px]' : ''}`}>
                          {/* Avatar Render */}
                          {!isMe && (
                            <div className="w-[30px] h-[30px] rounded-full overflow-hidden mr-1.5 shrink-0 mb-0.5">
                              {isLastInGroup && (
                                senderAvatar ? <img src={senderAvatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-transparent"></div>
                              )}
                            </div>
                          )}

                          {/* Message Bubble Wrapper - All 4 corners rounded */}
                          <div className={`max-w-[75%] relative flex flex-col ${msg.isSticker ? 'bg-transparent' : (isMe ? (config.isDarkMode ? 'bg-[#16593A]' : 'bg-[#DCF7C5]') : (config.isDarkMode ? 'bg-[#242625]' : 'bg-white'))} ${!msg.isSticker ? `shadow-sm rounded-[12px] ${bubblePadding}` : ''}`}>
                            
                            {/* Dynamic Colored Name Header */}
                            {!isMe && isFirstInGroup && (
                              <div 
                                className={`text-[14px] font-medium leading-none ${msg.isSticker ? `${config.isDarkMode ? 'bg-[#242625]' : 'bg-white'} shadow-[0_1px_1px_rgba(0,0,0,0.1)] rounded-full px-2.5 py-1.5 -mb-2 relative z-10 w-max text-[13px]` : `mb-1 ${msg.hasImage ? 'ml-[8px] mt-[4px]' : ''}`}`}
                                style={{ color: getColorForUser(msg.senderName) }}
                              >
                                {msg.senderName}
                              </div>
                            )}

                            {/* Standard Photo */}
                            {!msg.isSticker && msg.hasImage && msg.imageUrl && (
                              <div className="relative">
                                <img src={msg.imageUrl} alt="attached" className={`w-full max-h-56 object-cover rounded-[8px] ${msg.text ? 'mb-1' : ''}`} />
                                {/* Overlay time if no text is provided */}
                                {!msg.text && (
                                  <div className="absolute bottom-1 right-1.5 bg-black/30 text-white text-[11px] px-[6px] py-[3px] rounded-full flex items-center drop-shadow-sm">
                                    <span>{msg.time}</span>
                                    {isMe && <div className="flex"><Tick status={msg.status} isOverlay={true} /></div>}
                                  </div>
                                )}
                              </div>
                            )}

                            {/* Sticker Rendering */}
                            {msg.isSticker && msg.hasImage && msg.imageUrl && (
                              <div className="flex flex-col">
                                <div className="relative">
                                  <img src={msg.imageUrl} alt="sticker" className="w-[130px] h-[130px] object-contain drop-shadow-md" />
                                  {msg.reaction && (
                                    <div className={`absolute -bottom-1.5 right-1 ${config.isDarkMode ? 'bg-[#2A2A2A] border-[#141414] text-[#e9edef]' : 'bg-white border-gray-200 text-black'} shadow-sm border rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center`}>
                                      {msg.reaction}
                                    </div>
                                  )}
                                </div>
                                <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] -mt-1.5 relative z-10`}>
                                  <span className={`${config.isDarkMode ? (isMe ? 'bg-[#0C2617]/60 text-[#AABFB5]' : 'bg-[#111111]/60 text-[#8696a0]') : (isMe ? 'bg-white/50 text-gray-500' : 'bg-white/90 text-gray-500')} shadow-sm px-1.5 py-[2px] rounded-full text-[11px]`}>{msg.time}</span>
                                  {isMe && <Tick status={msg.status} />}
                                </div>
                              </div>
                            )}

                            {/* Standard Text Rendering (With Mentions) */}
                            {!msg.isSticker && msg.text && (
                              <div className={`relative min-w-[70px] ${msg.hasImage ? 'px-1 pb-1' : ''}`}>
                                <span className={`text-[16px] ${config.isDarkMode ? 'text-[#e9edef]' : 'text-black'} leading-[1.35] tracking-[-0.4px] whitespace-pre-wrap inline break-words mr-1`}>
                                  {renderTextWithMentions(msg.text)}
                                </span>
                                <div className={`inline-flex items-center justify-end text-[11px] ${config.isDarkMode ? (isMe ? 'text-[#AABFB5]' : 'text-[#8696a0]') : 'text-gray-500'} float-right ml-1 mt-[5px] h-[15px]`}>
                                  <span className="mt-[1px]">{msg.time}</span>
                                  {isMe && <Tick status={msg.status} />}
                                </div>
                                <div className="clear-both"></div>
                              </div>
                            )}
                            
                            {/* Standard Bubble Reaction */}
                            {!msg.isSticker && msg.reaction && (
                              <div className={`absolute -bottom-3 ${isMe ? 'right-1' : 'right-1'} ${config.isDarkMode ? 'bg-[#2A2A2A] border-[#141414] text-[#e9edef]' : 'bg-white border-gray-200 text-black'} shadow-sm border rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center`}>
                                {msg.reaction}
                              </div>
                            )}

                          </div>
                        </div>
                      );
                    }
                  })}
                </div>
              </div>

              {/* Input Area */}
              <div className={`h-[85px] ${config.isDarkMode ? 'bg-gradient-to-b from-[#111111] to-[#141414] border-[#242625]' : 'bg-[#F6F6F6] border-gray-300'} border-t flex items-start pt-2 px-3 space-x-3 z-10 pb-8 shrink-0`}>
                <div className="mt-1">
                  <Icons.Plus color={iconInputColor} />
                </div>
                <div className={`flex-1 ${config.isDarkMode ? 'bg-[#2A2A2A]' : 'bg-white border border-gray-300'} rounded-full h-[34px] flex items-center px-3 justify-between shadow-sm mt-0.5`}>
                  <span className={`${config.isDarkMode ? 'text-[#8696a0]' : 'text-gray-400'} text-[15px] pt-0.5 tracking-tight`}>Message</span>
                  <Icons.Sticker color={iconMutedColor} />
                </div>
                <div className="mt-1">
                  <Icons.Camera color={iconInputColor} />
                </div>
                <div className="mt-1">
                  <Icons.Mic color={iconInputColor} />
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WhatsAppGenerator />);
  </script>
</body>
</html>
