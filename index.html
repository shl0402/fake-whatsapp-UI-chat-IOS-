<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local WhatsApp Mockup Editor V10.1</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Force Apple System Font */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wa-bg {
      background-color: #E5DDD5;
      /* Authentic WhatsApp Doodle Pattern */
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: cover;
      background-blend-mode: multiply;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Authentic WhatsApp Group Colors ---
    const WA_COLORS = [
      '#EA0070', '#35CD96', '#539BF1', '#FF8A00', 
      '#CB87D6', '#91AB01', '#007AFF', '#DF7A9E', 
      '#E542A3', '#6BCBE6', '#F2A900', '#00A36C'
    ];

    const Icons = {
      ChevronLeft: () => (
        <svg viewBox="0 0 14 24" fill="none" stroke="#007AFF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-[14px] h-[22px] mr-1">
          <path d="M11 4L2.5 12L11 20" />
        </svg>
      ),
      VideoWithArrow: () => (
        <svg viewBox="0 0 34 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[36px] h-[24px]">
          <path d="M3 8.5C3 7.11929 4.11929 6 5.5 6H15.5C16.8807 6 18 7.11929 18 8.5V15.5C18 16.8807 16.8807 18 15.5 18H5.5C4.11929 18 3 16.8807 3 15.5V8.5Z" />
          <polygon points="18 10.5 24 7.5 24 16.5 18 13.5" strokeLinejoin="round" />
          <path d="M28 11L30.5 13.5L33 11" strokeWidth="1.5" />
        </svg>
      ),
      Plus: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[26px] h-[26px]">
          <line x1="12" y1="4" x2="12" y2="20" />
          <line x1="4" y1="12" x2="20" y2="12" />
        </svg>
      ),
      Camera: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[24px] h-[24px]">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.5l1.5-2.5h6l1.5 2.5H20a2 2 0 0 1 2 2z" />
          <circle cx="12" cy="13" r="3.5" />
        </svg>
      ),
      Mic: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[22px] h-[22px]">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        </svg>
      ),
      Sticker: () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="#8E8E93" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-[20px] h-[20px]">
          <path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z" />
          <path d="M15 3v6h6" />
        </svg>
      ),
      Cellular: () => (
        <svg viewBox="0 0 18 12" fill="currentColor" className="w-[16px] h-[11px]">
          <rect x="0" y="9" width="3" height="3" rx="1" />
          <rect x="5" y="6" width="3" height="6" rx="1" />
          <rect x="10" y="3" width="3" height="9" rx="1" />
          <rect x="15" y="0" width="3" height="12" rx="1" />
        </svg>
      ),
      Battery: () => (
        <svg viewBox="0 0 25 12" fill="none" className="w-[24px] h-[12px] relative top-[-0.5px]">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" strokeWidth="1"/>
          <rect x="2" y="2" width="18" height="8" rx="2" fill="currentColor"/>
          <path d="M23 4.5C23.5523 4.5 24 4.94772 24 5.5V6.5C24 7.05228 23.5523 7.5 23 7.5" fill="currentColor"/>
        </svg>
      )
    };

    function WhatsAppGenerator() {
      const [config, setConfig] = useState({
        osTime: '8:18',
        unreadCount: '70',
        networkType: 'LTE',
        chatName: 'Group Name',
        chatType: 'group',
        members: 'Timothy, Samuel, ...',
        groupIcon: '',
      });

      const [messages, setMessages] = useState([
        {
          id: 1,
          sender: 'other',
          senderName: 'Username',
          text: 'Text message',
          time: '6:19 AM', 
          hasImage: false,
          isSticker: false,
          imageUrl: '',
          avatarUrl: '',
          reaction: '',
          status: 'read'
        }
      ]);

      const handleImageUpload = (e, callback) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            callback(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const exportData = () => {
        const data = { config, messages };
        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'whatsapp-mockup-export.json';
        a.click();
      };

      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.config) setConfig(data.config);
            if (data.messages) setMessages(data.messages);
          } catch (err) {
            alert('Invalid JSON file format.');
          }
        };
        reader.readAsText(file);
      };

      const addMessage = (type) => {
        setMessages([...messages, {
          id: Date.now(),
          sender: type,
          senderName: type === 'other' ? 'New User' : 'You',
          text: '',
          time: config.osTime + ' AM', 
          hasImage: false,
          isSticker: false,
          imageUrl: '',
          avatarUrl: '',
          reaction: '',
          status: 'read'
        }]);
      };

      const deleteMessage = (id) => {
        setMessages(messages.filter(msg => msg.id !== id));
      };

      const getAvatarForSender = (senderName) => {
        const msgWithAvatar = messages.find(m => m.sender === 'other' && m.senderName === senderName && m.avatarUrl);
        return msgWithAvatar ? msgWithAvatar.avatarUrl : null;
      };

      const getColorForUser = (username) => {
        if (!username) return WA_COLORS[0];
        let hash = 0;
        for (let i = 0; i < username.length; i++) {
          hash = username.charCodeAt(i) + ((hash << 5) - hash);
        }
        const index = Math.abs(hash) % WA_COLORS.length;
        return WA_COLORS[index];
      };

      const renderTextWithMentions = (text) => {
        if (!text) return null;
        const parts = text.split(/(@[^\s,?!]+)/g);
        return parts.map((part, i) => {
          if (part.startsWith('@')) {
            return <span key={i} className="text-[#007AFF]">{part}</span>;
          }
          return part;
        });
      };

      const Tick = ({ status, isOverlay }) => {
        const color = status === 'read' ? '#34B7F1' : (isOverlay ? '#FFFFFF' : '#8696A0');
        const opacity = isOverlay && status !== 'read' ? 'opacity-100' : 'opacity-80';
        
        if (status === 'sent') {
          return (
            <svg viewBox="0 0 16 15" width="16" height="14" className={`ml-[1px] ${opacity}`}>
              <path d="M10.9 4.3L6.5 10.1L4 7.2" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          );
        }
        return (
          <svg viewBox="0 0 16 15" width="18" height="14" className={`ml-[1px] ${opacity}`}>
            <path d="M10.9 4.3L6.5 10.1L4 7.2" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M15 4.3L10.6 10.1L9 8" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        );
      };

      // Grouping Logic for Sticker Pairs
      const groupedMessages = [];
      for (let i = 0; i < messages.length; i++) {
        if (
          messages[i].isSticker && 
          i + 1 < messages.length && 
          messages[i+1].isSticker && 
          messages[i].sender === messages[i+1].sender && 
          messages[i].senderName === messages[i+1].senderName
        ) {
          groupedMessages.push({ isPair: true, msg1: messages[i], msg2: messages[i+1], index1: i, index2: i + 1 });
          i++; 
        } else {
          groupedMessages.push({ isPair: false, msg: messages[i], index: i });
        }
      }

      return (
        <div className="flex h-screen bg-gray-100">
          {/* LEFT PANE: Editor */}
          <div className="w-1/2 p-6 bg-white overflow-y-auto border-r border-gray-300 shadow-lg z-20">
            
            {/* Header with Import/Export Buttons */}
            <div className="flex justify-between items-center mb-6">
              <h1 className="text-2xl font-bold text-gray-800">WhatsApp Mockup Editor V10.1</h1>
              <div className="flex space-x-3">
                <label className="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg shadow-sm text-sm font-semibold cursor-pointer hover:bg-blue-200 transition-colors">
                  Import JSON
                  <input type="file" accept=".json" onChange={importData} className="hidden" />
                </label>
                <button onClick={exportData} className="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-sm text-sm font-semibold hover:bg-blue-700 transition-colors">
                  Export JSON
                </button>
              </div>
            </div>
            
            <div className="space-y-4 mb-8 p-5 bg-gray-50 rounded-xl border border-gray-200">
              <h2 className="font-bold text-lg border-b pb-2 text-gray-700">Header Settings</h2>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">OS Time</label>
                  <input type="text" value={config.osTime} onChange={e => setConfig({...config, osTime: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Network (LTE/Wi-Fi)</label>
                  <input type="text" value={config.networkType} onChange={e => setConfig({...config, networkType: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Back Button Unread Count</label>
                  <input type="text" value={config.unreadCount} onChange={e => setConfig({...config, unreadCount: e.target.value})} placeholder="e.g. 70" className="w-full border p-2 rounded" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Chat Name</label>
                  <input type="text" value={config.chatName} onChange={e => setConfig({...config, chatName: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div className="col-span-2">
                  <label className="block text-sm font-medium text-gray-600 mb-1">Subtitle / Members</label>
                  <input type="text" value={config.members} onChange={e => setConfig({...config, members: e.target.value})} className="w-full border p-2 rounded" />
                </div>
                <div className="col-span-2">
                  <label className="block text-sm font-medium text-gray-600 mb-1">Group Profile Icon</label>
                  <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, (url) => setConfig({...config, groupIcon: url}))} className="w-full border p-2 rounded bg-white" />
                </div>
              </div>
            </div>

            <div>
              {/* Top Add Buttons */}
              <div className="flex justify-between items-center mb-4">
                <h2 className="font-bold text-lg text-gray-700">Messages</h2>
                <div className="space-x-2">
                  <button onClick={() => addMessage('me')} className="bg-[#DCF7C5] border border-green-300 text-green-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Me</button>
                  <button onClick={() => addMessage('other')} className="bg-gray-200 border border-gray-300 text-gray-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Other</button>
                </div>
              </div>

              {messages.map((msg, index) => (
                <div key={msg.id} className="p-4 mb-4 border rounded-xl bg-gray-50 relative">
                  <button onClick={() => deleteMessage(msg.id)} className="absolute top-2 right-2 text-red-500 hover:text-red-700 text-sm font-bold">✕ Remove</button>
                  <div className="flex space-x-2 items-center mb-2 flex-wrap gap-y-2 pr-16">
                    <span className="font-bold text-sm text-gray-700 w-24 shrink-0">Msg {index + 1} ({msg.sender === 'me' ? 'You' : 'Other'})</span>
                    
                    {msg.sender === 'other' && (
                      <input 
                        type="text" 
                        placeholder="Sender Name" 
                        value={msg.senderName}
                        onChange={(e) => {
                          const newMsgs = [...messages];
                          newMsgs[index].senderName = e.target.value;
                          setMessages(newMsgs);
                        }}
                        className="flex-1 border p-1 rounded text-sm font-semibold min-w-[100px]"
                        style={{ color: getColorForUser(msg.senderName) }} 
                      />
                    )}
                    <input 
                      type="text" 
                      placeholder="Time (e.g. 8:18 AM)" 
                      value={msg.time}
                      onChange={(e) => {
                        const newMsgs = [...messages];
                        newMsgs[index].time = e.target.value;
                        setMessages(newMsgs);
                      }}
                      className="w-20 border p-1 rounded text-sm shrink-0"
                    />
                    <input 
                      type="text" 
                      placeholder="React (e.g. ❤️)" 
                      value={msg.reaction || ''}
                      onChange={(e) => {
                        const newMsgs = [...messages];
                        newMsgs[index].reaction = e.target.value;
                        setMessages(newMsgs);
                      }}
                      className="w-24 border p-1 rounded text-sm shrink-0"
                    />
                  </div>

                  <textarea 
                    placeholder="Message Text..."
                    value={msg.text}
                    onChange={(e) => {
                      const newMsgs = [...messages];
                      newMsgs[index].text = e.target.value;
                      setMessages(newMsgs);
                    }}
                    className="w-full border p-2 rounded mb-3 text-sm min-h-[50px]"
                  />
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div className="flex flex-col space-y-1">
                      <span className="text-xs font-semibold text-gray-600">Attach Standard Photo:</span>
                      <input 
                        type="file" 
                        accept="image/*"
                        onChange={(e) => handleImageUpload(e, (url) => {
                          const newMsgs = [...messages];
                          newMsgs[index].hasImage = true;
                          newMsgs[index].isSticker = false;
                          newMsgs[index].imageUrl = url;
                          setMessages(newMsgs);
                        })}
                        className="text-xs bg-white border rounded p-1 w-full"
                      />
                    </div>
                    <div className="flex flex-col space-y-1">
                      <span className="text-xs font-semibold text-gray-600">Attach Sticker (No bg):</span>
                      <input 
                        type="file" 
                        accept="image/*"
                        onChange={(e) => handleImageUpload(e, (url) => {
                          const newMsgs = [...messages];
                          newMsgs[index].hasImage = true;
                          newMsgs[index].isSticker = true;
                          newMsgs[index].imageUrl = url;
                          setMessages(newMsgs);
                        })}
                        className="text-xs bg-white border rounded p-1 w-full"
                      />
                    </div>
                  </div>

                  {msg.sender === 'other' && (
                    <div className="mt-3 flex flex-col space-y-1 bg-white p-2 rounded border border-blue-100">
                      <span className="text-xs font-semibold text-blue-600">User's Avatar (Only needed on 1 message per person):</span>
                      <input 
                        type="file" 
                        accept="image/*"
                        onChange={(e) => handleImageUpload(e, (url) => {
                          const newMsgs = [...messages];
                          newMsgs[index].avatarUrl = url;
                          setMessages(newMsgs);
                        })}
                        className="text-xs w-full"
                      />
                    </div>
                  )}
                </div>
              ))}

              {/* Bottom Add Buttons (Convenience Duplicate) */}
              <div className="flex justify-end items-center mt-2 mb-8">
                <div className="space-x-2">
                  <button onClick={() => addMessage('me')} className="bg-[#DCF7C5] border border-green-300 text-green-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Me</button>
                  <button onClick={() => addMessage('other')} className="bg-gray-200 border border-gray-300 text-gray-800 px-3 py-1 rounded shadow-sm text-sm font-medium">+ Add Other</button>
                </div>
              </div>

            </div>
          </div>

          {/* RIGHT PANE: Live Preview */}
          <div className="w-1/2 p-6 bg-[#d1d5db] flex justify-center items-center overflow-y-auto">
            <div className="w-[393px] h-[852px] bg-white rounded-[3rem] shadow-2xl border-[12px] border-black flex flex-col relative overflow-hidden ring-1 ring-gray-900/10">
              
              {/* iOS Status Bar */}
              <div className="h-12 bg-[#F6F6F6] text-black pl-8 pr-[22px] flex justify-between items-center text-[15px] font-semibold z-10 pt-2">
                <span>{config.osTime}</span>
                <div className="absolute top-2 left-1/2 -translate-x-1/2 w-[120px] h-[30px] bg-black rounded-full"></div>
                <div className="flex items-center space-x-[4px]">
                  <Icons.Cellular />
                  {config.networkType && <span className="text-[12px] font-bold">{config.networkType}</span>}
                  <Icons.Battery />
                </div>
              </div>

              {/* WhatsApp Header */}
              <div className="bg-[#F6F6F6] border-b border-gray-300 px-1 py-2 flex items-center justify-between z-10 relative shadow-sm">
                <div className="flex items-center cursor-pointer">
                  <div className="flex items-center text-[#007AFF] px-1">
                    <Icons.ChevronLeft />
                    {config.unreadCount && <span className="text-[17px] mr-1.5">{config.unreadCount}</span>}
                  </div>
                  <div className="w-10 h-10 bg-gray-300 rounded-full overflow-hidden mr-3">
                    {config.groupIcon ? <img src={config.groupIcon} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-gray-400"></div>}
                  </div>
                  <div className="flex flex-col">
                    <span className="font-semibold text-[16px] leading-tight text-black tracking-tight">{config.chatName}</span>
                    <span className="text-gray-500 text-[13px] truncate w-[130px]">{config.members}</span>
                  </div>
                </div>
                <div className="flex space-x-6 px-3">
                  <Icons.VideoWithArrow />
                </div>
              </div>

              {/* Chat Body */}
              <div className="flex-1 pl-1 pr-3 pt-3 overflow-y-auto pb-20 relative wa-bg">
                {groupedMessages.map((block) => {
                  
                  // --- PAIRED STICKER RENDER ---
                  if (block.isPair) {
                    const { msg1, msg2, index1, index2 } = block;
                    const isMe = msg1.sender === 'me';
                    
                    let isFirstInGroup = false;
                    if (index1 === 0) isFirstInGroup = true;
                    else {
                      const prev = messages[index1 - 1];
                      if (prev.sender !== msg1.sender || (!isMe && prev.senderName !== msg1.senderName) || prev.isSticker) isFirstInGroup = true;
                    }

                    let isLastInGroup = false;
                    if (index2 === messages.length - 1) isLastInGroup = true;
                    else {
                      const next = messages[index2 + 1];
                      if (next.sender !== msg2.sender || (!isMe && next.senderName !== msg2.senderName) || next.isSticker) isLastInGroup = true;
                    }

                    const senderAvatar = !isMe ? getAvatarForSender(msg1.senderName) : null;
                    const hasReaction = !!msg1.reaction || !!msg2.reaction;

                    return (
                      <div key={`${msg1.id}-${msg2.id}`} className={`flex ${isMe ? 'justify-end' : 'justify-start items-end'} ${isFirstInGroup ? 'mt-3' : 'mt-1'} ${hasReaction ? 'mb-[14px]' : ''}`}>
                        {/* Avatar Render */}
                        {!isMe && (
                          <div className="w-[30px] h-[30px] rounded-full overflow-hidden mr-1.5 shrink-0 mb-0.5">
                            {isLastInGroup && (
                              senderAvatar ? <img src={senderAvatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-transparent"></div>
                            )}
                          </div>
                        )}
                        <div className="flex flex-col max-w-[80%]">
                          {/* Sticker Pair Colored Name Header */}
                          {!isMe && isFirstInGroup && (
                            <div 
                              className="text-[13px] font-medium leading-none bg-white shadow-[0_1px_1px_rgba(0,0,0,0.1)] rounded-full px-2.5 py-1.5 mb-0.5 w-max"
                              style={{ color: getColorForUser(msg1.senderName) }}
                            >
                              {msg1.senderName}
                            </div>
                          )}
                          <div className="flex flex-row space-x-1.5 relative">
                            {/* Sticker 1 */}
                            <div className="flex flex-col">
                              <div className="relative">
                                <img src={msg1.imageUrl} alt="sticker" className="w-[110px] h-[110px] object-contain drop-shadow-md" />
                                {msg1.reaction && (
                                  <div className="absolute -bottom-1.5 right-1 bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center">
                                    {msg1.reaction}
                                  </div>
                                )}
                              </div>
                              <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] mt-1`}>
                                <span className={`${!isMe ? 'bg-white/90 shadow-sm px-1.5 py-[2px] rounded-full text-gray-500' : 'bg-white/50 px-1.5 py-[2px] rounded-full shadow-sm text-gray-500'}`}>{msg1.time}</span>
                                {isMe && <Tick status={msg1.status} />}
                              </div>
                            </div>
                            {/* Sticker 2 */}
                            <div className="flex flex-col">
                              <div className="relative">
                                <img src={msg2.imageUrl} alt="sticker" className="w-[110px] h-[110px] object-contain drop-shadow-md" />
                                {msg2.reaction && (
                                  <div className="absolute -bottom-1.5 right-1 bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center">
                                    {msg2.reaction}
                                  </div>
                                )}
                              </div>
                              <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] mt-1`}>
                                <span className={`${!isMe ? 'bg-white/90 shadow-sm px-1.5 py-[2px] rounded-full text-gray-500' : 'bg-white/50 px-1.5 py-[2px] rounded-full shadow-sm text-gray-500'}`}>{msg2.time}</span>
                                {isMe && <Tick status={msg2.status} />}
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  } 
                  
                  // --- SINGLE MESSAGE / SINGLE STICKER RENDER ---
                  else {
                    const { msg, index } = block;
                    const isMe = msg.sender === 'me';
                    
                    let isFirstInGroup = false;
                    if (index === 0) {
                      isFirstInGroup = true;
                    } else {
                      const prev = messages[index - 1];
                      if (prev.sender !== msg.sender || (!isMe && prev.senderName !== msg.senderName)) {
                        isFirstInGroup = true;
                      } else if (msg.isSticker || prev.isSticker) {
                        isFirstInGroup = true;
                      }
                    }

                    let isLastInGroup = false;
                    if (index === messages.length - 1) {
                      isLastInGroup = true;
                    } else {
                      const next = messages[index + 1];
                      if (next.sender !== msg.sender || (!isMe && next.senderName !== msg.senderName)) {
                        isLastInGroup = true;
                      } else if (msg.isSticker || next.isSticker) {
                        isLastInGroup = true;
                      }
                    }
                    
                    const senderAvatar = !isMe ? getAvatarForSender(msg.senderName) : null;
                    const bubblePadding = msg.isSticker ? '' : (msg.hasImage ? (msg.text ? 'p-1 pb-1.5' : 'p-1 pb-1') : 'px-3 pt-2 pb-1.5');
                    const hasReaction = !!msg.reaction;

                    return (
                      <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start items-end'} ${isFirstInGroup ? 'mt-3' : 'mt-1'} ${hasReaction ? 'mb-[14px]' : ''}`}>
                        {/* Avatar Render */}
                        {!isMe && (
                          <div className="w-[30px] h-[30px] rounded-full overflow-hidden mr-1.5 shrink-0 mb-0.5">
                            {isLastInGroup && (
                              senderAvatar ? <img src={senderAvatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-transparent"></div>
                            )}
                          </div>
                        )}

                        {/* Message Bubble Wrapper */}
                        <div className={`max-w-[75%] relative flex flex-col ${msg.isSticker ? 'bg-transparent' : (isMe ? 'bg-[#DCF7C5]' : 'bg-white')} ${!msg.isSticker ? `shadow-sm rounded-[12px] ${bubblePadding}` : ''}`}>
                          
                          {/* Dynamic Colored Name Header */}
                          {!isMe && isFirstInGroup && (
                            <div 
                              className={`text-[14px] font-medium leading-none ${msg.isSticker ? 'bg-white shadow-[0_1px_1px_rgba(0,0,0,0.1)] rounded-full px-2.5 py-1.5 mb-1 w-max text-[13px]' : `mb-1 ${msg.hasImage ? 'ml-[8px] mt-[4px]' : ''}`}`}
                              style={{ color: getColorForUser(msg.senderName) }}
                            >
                              {msg.senderName}
                            </div>
                          )}

                          {/* Standard Photo */}
                          {!msg.isSticker && msg.hasImage && msg.imageUrl && (
                            <div className="relative">
                              <img src={msg.imageUrl} alt="attached" className={`w-full max-h-56 object-cover rounded-[8px] ${msg.text ? 'mb-1' : ''}`} />
                              {/* Overlay time if no text is provided */}
                              {!msg.text && (
                                <div className="absolute bottom-1 right-1.5 bg-black/30 text-white text-[11px] px-[6px] py-[3px] rounded-full flex items-center drop-shadow-sm">
                                  <span>{msg.time}</span>
                                  {isMe && <div className="flex"><Tick status={msg.status} isOverlay={true} /></div>}
                                </div>
                              )}
                            </div>
                          )}

                          {/* Sticker Rendering */}
                          {msg.isSticker && msg.hasImage && msg.imageUrl && (
                            <div className="flex flex-col">
                              <div className="relative">
                                <img src={msg.imageUrl} alt="sticker" className="w-[130px] h-[130px] object-contain drop-shadow-md" />
                                {msg.reaction && (
                                  <div className="absolute -bottom-1.5 right-1 bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center">
                                    {msg.reaction}
                                  </div>
                                )}
                              </div>
                              <div className={`flex items-center ${isMe ? 'justify-end pr-1' : 'justify-start pl-1'} text-[11px] mt-1`}>
                                <span className={`${!isMe ? 'bg-white/90 shadow-sm px-1.5 py-[2px] rounded-full text-gray-500' : 'bg-white/50 px-1.5 py-[2px] rounded-full shadow-sm text-gray-500'}`}>{msg.time}</span>
                                {isMe && <Tick status={msg.status} />}
                              </div>
                            </div>
                          )}

                          {/* Standard Text Rendering (With Mentions) */}
                          {!msg.isSticker && msg.text && (
                            <div className={`relative min-w-[70px] ${msg.hasImage ? 'px-1 pb-1' : ''}`}>
                              <span className="text-[16px] text-black leading-[1.35] tracking-[-0.4px] whitespace-pre-wrap inline break-words mr-1">
                                {renderTextWithMentions(msg.text)}
                              </span>
                              <div className="inline-flex items-center justify-end text-[11px] text-gray-500 float-right ml-1 mt-[5px] h-[15px]">
                                <span className="mt-[1px]">{msg.time}</span>
                                {isMe && <Tick status={msg.status} />}
                              </div>
                              <div className="clear-both"></div>
                            </div>
                          )}
                          
                          {/* Standard Bubble Reaction */}
                          {!msg.isSticker && msg.reaction && (
                            <div className={`absolute -bottom-3 ${isMe ? 'right-1' : 'right-1'} bg-white shadow-sm border border-gray-200 rounded-full px-1.5 py-[2px] text-[13px] leading-none z-10 min-w-[24px] text-center`}>
                              {msg.reaction}
                            </div>
                          )}

                        </div>
                      </div>
                    );
                  }
                })}
              </div>

              {/* Input Area */}
              <div className="h-[85px] bg-[#F6F6F6] border-t border-gray-300 flex items-start pt-2 px-3 space-x-3 z-10 pb-8">
                <div className="mt-1">
                  <Icons.Plus />
                </div>
                <div className="flex-1 bg-white border border-gray-300 rounded-full h-[34px] flex items-center px-3 justify-between shadow-sm mt-0.5">
                  <span className="text-gray-400 text-[15px] pt-0.5 tracking-tight">Message</span>
                  <Icons.Sticker />
                </div>
                <div className="mt-1">
                  <Icons.Camera />
                </div>
                <div className="mt-1">
                  <Icons.Mic />
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WhatsAppGenerator />);
  </script>
</body>
</html>
